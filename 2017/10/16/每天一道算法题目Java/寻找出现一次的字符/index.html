        <h1 id="寻找出现一次的字符-md"><a href="#寻找出现一次的字符-md" class="headerlink" title="寻找出现一次的字符.md"></a>寻找出现一次的字符.md</h1><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment">  * 【剑指offer】数组中只出现一次字符</span></span><br><span class="line"><span class="comment">  *</span></span><br><span class="line"><span class="comment">  * <span class="doctag">@param</span> nums</span></span><br><span class="line"><span class="comment">  */</span></span><br><span class="line"> <span class="function"><span class="keyword">private</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title">getSingleN</span><span class="params">(String nums)</span> </span>&#123;</span><br><span class="line">     <span class="keyword">char</span>[] chars = nums.toCharArray();</span><br><span class="line"></span><br><span class="line">     HashMap&lt;Object, Integer&gt; map = <span class="keyword">new</span> HashMap&lt;&gt;();</span><br><span class="line">     <span class="keyword">for</span> (<span class="keyword">char</span> aChar : chars) &#123;</span><br><span class="line">         <span class="keyword">if</span> (map.containsKey(aChar)) &#123;</span><br><span class="line">             Integer integer = map.get(aChar);</span><br><span class="line">             integer++;</span><br><span class="line">             map.put(aChar, integer);</span><br><span class="line">         &#125;<span class="keyword">else</span> &#123;</span><br><span class="line">             map.put(aChar, <span class="number">1</span>);</span><br><span class="line">         &#125;</span><br><span class="line">     &#125;</span><br><span class="line">     System.out.println(map);</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">     <span class="keyword">for</span> (Map.Entry&lt;Object, Integer&gt; entry : map.entrySet()) &#123;</span><br><span class="line">         <span class="keyword">if</span> (entry.getValue()==<span class="number">1</span>) &#123;</span><br><span class="line">             System.out.println(<span class="string">"只出现一次的字符有："</span>+entry.getKey());</span><br><span class="line">         &#125;</span><br><span class="line">     &#125;</span><br><span class="line"></span><br><span class="line"> &#125;</span><br></pre></td></tr></table></figure>
