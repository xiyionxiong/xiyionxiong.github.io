an><br><span class="line">/**</span><br><span class="line"></span><br><span class="line">*使用一个二叉树来实现一个插入排序</span><br><span class="line"></span><br><span class="line">*/</span><br><span class="line"></span><br><span class="line">func  main() &#123;</span><br><span class="line">    intArray := []int&#123;3, 2, &apos;a&apos;, &apos;c&apos;, &apos;b&apos;, 34, 23, 12, 25, 66, 75, 47, 48, 30&#125;</span><br><span class="line">    Sort(intArray)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">type  tree  struct &#123;</span><br><span class="line">    value int</span><br><span class="line">    left, right *tree</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">func  Sort(values []int) &#123;</span><br><span class="line">    var root *tree</span><br><span class="line">    for _, v :=  range values &#123;</span><br><span class="line">        root =  add(root, v)</span><br><span class="line">    &#125;</span><br><span class="line">    rootArrays :=  appendVlues(values[:0], root)</span><br><span class="line">    fmt.Println(rootArrays)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">func  appendVlues(values []int, t *tree) []int &#123;</span><br><span class="line">    if t !=  nil &#123;</span><br><span class="line">	values =  appendVlues(values, t.left)</span><br><span class="line">	values =  append(values, t.value)</span><br><span class="line">	values =  appendVlues(values, t.right)</span><br><span class="line">    &#125;</span><br><span class="line">    return values</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">func  add(t *tree, value int) *tree &#123;</span><br><span class="line">    if t ==  nil &#123;</span><br><span class="line">        t =  new(tree)</span><br><span class="line">        t.value = value</span><br><span class="line">        return t</span><br><span class="line">    &#125;</span><br><span class="line">    if value &lt; t.value &#123;</span><br><span class="line">        t.left =  add(t.left, value)</span><br><span class="line">    &#125; else &#123;</span><br><span class="line">        t.right =  add(t.right, value)</span><br><span class="line">    &#125;</span><br><span class="line">    return t</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
